spring.application.name=e-comerce

# 1. Configurar la URL y credenciales de la base de datos local (Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/ecommercedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configurar JPA/Hibernate (Actualiza las tablas basado en tus entidades)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola (Opcional, útil para debug)
spring.jpa.show-sql=true

# JWT Configuration
# 1. Clave Secreta JWT (Secret Key)
# Esta clave se usa para firmar y validar el token.
# Idealmente, use una variable de entorno en producción.
# TODO: sacar la clave secreta de aquí en producción, almacenarla en un lugar seguro como una variable de entorno
jwt.secret=miClaveSecretaDe32CaracteresParaJWT2025

# 2. Tiempo de Expiración del Token (Expiration Time)
# Define por cuánto tiempo será válido el token, en milisegundos (ms).
# Ejemplo: 24 horas = 86400000 ms
jwt.expiration=86400000
