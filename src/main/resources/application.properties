spring.application.name=e-comerce

# ── MySQL (XAMPP) ─────────────────────────────────────────────────────────────
# createDatabaseIfNotExist=true crea la base automáticamente si no existe
spring.datasource.url=jdbc:mysql://localhost:3306/ecommercedb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# MySQLDialect reemplaza a MySQL8Dialect que fue eliminado en Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# TODO: mover a variable de entorno antes de producción
jwt.secret=miClaveSecretaDe32CaracteresParaJWT2025
jwt.expiration=86400000